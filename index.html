<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Todo List</h1>
    <p class="subtitle">Track quick personal tasks, mark them complete, and remove them when you are done.</p>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="What needs to get done?" aria-label="Task description">
      <button id="addBtn" type="button">Add Task</button>
    </div>
    <div id="taskList" aria-live="polite"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
