<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="container">
      <header class="page-header">
        <h1>Todo List</h1>
        <p class="subtitle">Capture what matters, find it instantly, and stay focused on the right next task.</p>
      </header>
      <section class="composer-card" aria-label="Add a task">
        <div class="input-row">
          <input type="text" id="taskInput" placeholder="What needs to get done?" aria-label="Task description">
          <select id="priorityInput" aria-label="Task priority">
            <option value="normal">Normal Priority</option>
            <option value="high">High Priority</option>
          </select>
          <input type="date" id="dueDateInput" aria-label="Task due date">
          <button id="addBtn" type="button">Add Task</button>
        </div>
      </section>
      <section class="controls-card toolbar" aria-label="Todo controls">
        <div class="search-row">
          <input type="search" id="searchInput" placeholder="Search tasks live" aria-label="Search tasks">
          <button id="clearSearchBtn" type="button">Clear Search</button>
        </div>
        <div class="filter-row" role="toolbar" aria-label="Task filters">
          <button id="filterAll" class="filter-btn active" type="button" aria-pressed="true">All</button>
          <button id="filterActive" class="filter-btn" type="button" aria-pressed="false">Active</button>
          <button id="filterCompleted" class="filter-btn" type="button" aria-pressed="false">Completed</button>
          <button id="filterHighPriority" class="filter-btn" type="button" aria-pressed="false">High Priority</button>
          <button id="filterDueToday" class="filter-btn" type="button" aria-pressed="false">Due Today</button>
        </div>
      </section>
      <p id="resultsSummary" class="results-summary" aria-live="polite"></p>
      <div id="taskList" class="task-list" aria-live="polite"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
